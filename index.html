<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elo Rating Tracker</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
    <script type="module" src="js/main.js" defer></script>
</head>
<body>
    <div class="app-container">
        <!-- Main Content Area -->
        <main class="main-content">
            <h1 class="logo">EloTracker</h1>
            <div id="simulation-banner" class="simulation-banner hidden">
                🧪 SIMULATION MODE ACTIVE
            </div>

            <div class="tabs">
                <button class="tab-link active" data-tab="players">Players</button>
                <button class="tab-link" data-tab="enter-data">Enter Data</button>
                <button class="tab-link" data-tab="history">Match History</button>
                <button class="tab-link" data-tab="h2h">Head-to-Head</button>
            </div>

            <div id="players" class="tab-content active">
                <div class="view-toggle-container">
                    <div class="view-toggle">
                        <button class="toggle-btn active" data-view="rankings">Rankings</button>
                        <button class="toggle-btn" data-view="all-players">All Players</button>
                    </div>
                </div>
                <div class="table-container">
                    <table class="player-table">
                        <thead>
                            <tr>
                                <th class="rankings-col-player">Player</th>
                                <th class="rankings-col-rating">Rating</th>
                                <th class="rankings-col-matches">Matches</th>
                                <th class="rankings-col-action"></th>
                            </tr>
                        </thead>
                        <tbody id="player-list-body">
                            <!-- Player data injected by JS -->
                        </tbody>
                    </table>
                </div>
                <br>    
                <i>Players become ranked after 5 matches.</i>
            </div>

            <div id="enter-data" class="tab-content">
                <!-- NEW: Simulation Mode Toggle Card -->
                <div class="card" style="margin-bottom: 2rem; border: 1px solid #ff9800;">
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <h2 style="margin-bottom: 0; border: none; padding: 0; color: #ff9800;">Simulation Mode</h2>
                            <p style="margin: 0; font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.25rem;">Test hypothetical matches without affecting real data.</p>
                        </div>
                        <label class="switch">
                            <input type="checkbox" id="simulation-toggle">
                            <span class="slider round"></span>
                        </label>
                    </div>
                </div>

                <div class="card">
                    <h2>Log a Match</h2>
                    <!-- ... rest of enter-data tab content remains exactly the same ... -->
                    <form id="log-match-form">
                        <label for="player1-select">Player 1</label>
                        <select id="player1-select" required></select>

                        <label for="player2-select">Player 2</label>
                        <select id="player2-select" required></select>

                        <label for="winner-select">Winner</label>
                        <select id="winner-select" required>
                            <option value="">-- Select Players First --</option>
                        </select>
                        
                        <button type="submit">Log Match</button>
                    </form>
                </div>

                <div class="card" style="margin-top: 2rem;">
                    <h2>Add New Player</h2>
                    <form id="add-player-form">
                        <label for="new-player-name">Player Name</label>
                        <input type="text" id="new-player-name" placeholder="Enter player name" required>
                        
                        <label>Starting Skill Level</label>
                        <div class="radio-group">
                            <div class="radio-option">
                                <input type="radio" id="elo-beginner" name="starting-elo" value="600">
                                <label for="elo-beginner">Beginner (600)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="elo-intermediate" name="starting-elo" value="800" checked>
                                <label for="elo-intermediate">Intermediate (800)</label>
                            </div>
                            <div class="radio-option">
                                <input type="radio" id="elo-advanced" name="starting-elo" value="1000">
                                <label for="elo-advanced">Advanced (1000)</label>
                            </div>
                        </div>

                        <button type="submit">Add Player</button>
                    </form>
                </div>

                <div class="card settings-card" style="margin-top: 2rem;">
                    <h2>Settings</h2>
                    <div class="settings-buttons">
                        <button id="export-btn" class="btn-secondary">Export Data</button>
                        <button id="import-btn" class="btn-secondary">Import Data</button>
                        <input type="file" id="import-file-input" accept=".json" style="display: none;">
                    </div>
                    <button id="reset-all-btn" class="btn-danger">Reset All Data</button>
                </div>
            </div>

            <div id="history" class="tab-content">
                <div class="filter-container card">
                    <label for="history-player-filter">Filter by Player</label>
                    <select id="history-player-filter"></select>
                </div>
                <ul id="match-history-list" class="match-history-list">
                    <!-- Match history injected by JS -->
                </ul>
            </div>

            <div id="h2h" class="tab-content">
                <div class="filter-container card">
                    <label for="h2h-player-filter">Filter by Player</label>
                    <select id="h2h-player-filter"></select>
                </div>
                <div class="table-container">
                    <table class="player-table h2h-table">
                        <thead>
                            <tr>
                                <th>PLAYER 1</th>
                                <th>SCORE</th>
                                <th>PLAYER 2</th>
                            </tr>
                        </thead>
                        <tbody id="h2h-stats-body">
                            <!-- H2H stats injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>
</body>
</html>
